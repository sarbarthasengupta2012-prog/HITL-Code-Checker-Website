<html>
    <head>
        <title>ADMIN PANEL: CODE IQ</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    </head>
    <body>
        <h1>ADMIN PANEL</h1>
        <h3>If you are not a admin: please leave immediately.</h3>
        <h1>SUBMITTED QUERIES:</h1>
        <div id="queries"></div>
        <script>
        (async () => {
            const password = prompt("ENTER THE PASSWORD");
            const response = await fetch('/check_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            if (!response.ok) {
                alert("Access Denied");
                document.body.innerHTML = "<h1>Unauthorized</h1>";
                return;
            }

            const socket = io();
            const queriesDiv = document.getElementById('queries');

            socket.emit("get_info");

            socket.on("get_info", (data) => {
                queriesDiv.innerHTML = "";
                data.forEach(item => {
                    const id = item._id.$oid;
                    const card = document.createElement('div');
                    card.className = "query-card";
                    card.innerHTML = `
                        <pre><code>${item.code}</code></pre>
                        <p><strong>AI Suggestion:</strong> ${item.ai_label || 'None'}</p>
                        <button class="btn-good">Mark CLEAN</button>
                        <button class="btn-bad">Mark MESSY</button>
                        <button class="btn-ignore">Ignore</button>
                    `;

                    // Clean Button
                    card.querySelector('.btn-good').onclick = () => {
                        socket.emit("save_to_json", { id: id, code: item.code, label: 1 });
                        card.remove();
                    };

                    // Messy Button
                    card.querySelector('.btn-bad').onclick = () => {
                        socket.emit("save_to_json", { id: id, code: item.code, label: 0 });
                        card.remove();
                    };

                    // Ignore Button
                    card.querySelector('.btn-ignore').onclick = () => {
                        socket.emit("delete_query", { id: id });
                        card.remove();
                    };

                    queriesDiv.appendChild(card);
                });
            });
        })();
        </script>
    </body>
</html>
